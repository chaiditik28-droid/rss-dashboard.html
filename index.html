<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ผลการดำเนินการกิจกรรม RSS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#eef1f8;font-family:'Sarabun','Noto Sans Thai',sans-serif;color:#1a1a2e;min-width:900px;font-size:15px}

  /* ===== TOPBAR ===== */
  .topbar{background:linear-gradient(135deg,#1e3a8a,#1d4ed8);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 3px 12px rgba(30,58,138,0.3)}
  .topbar-left{display:flex;align-items:center;gap:14px}
  .topbar-icon{width:42px;height:42px;background:rgba(255,255,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
  .topbar-title h2{font-size:18px;font-weight:900;color:#fff;line-height:1.3;letter-spacing:.2px}
  .topbar-title p{font-size:12px;color:rgba(255,255,255,0.75);margin-top:2px;font-weight:600}
  .topbar-right{display:flex;align-items:center;gap:10px}
  .yr-badge{background:rgba(255,255,255,0.2);color:#fff;border-radius:20px;padding:6px 16px;font-size:13px;font-weight:800;border:1.5px solid rgba(255,255,255,0.35)}
  .refresh-btn{background:#fff;color:#1e3a8a;border:none;border-radius:20px;padding:7px 16px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .15s;box-shadow:0 2px 6px rgba(0,0,0,0.12)}
  .refresh-btn:hover{background:#eff6ff;transform:translateY(-1px)}

  /* ===== SUMMARY CARDS ===== */
  .summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:20px 28px}
  .sum-card{background:#fff;border-radius:14px;padding:22px 24px;border:1px solid #e2e8f0;display:flex;flex-direction:column;gap:8px;box-shadow:0 2px 8px rgba(0,0,0,0.06);transition:transform .15s}
  .sum-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,0.1)}
  .sum-card .s-icon{font-size:26px}
  .sum-card .s-num{font-size:46px;font-weight:900;line-height:1;letter-spacing:-1px}
  .sum-card .s-label{font-size:14px;font-weight:700;color:#4b5563}
  .sum-card.blue{background:linear-gradient(135deg,#eff6ff,#dbeafe);border-color:#93c5fd}
  .sum-card.blue .s-num{color:#1d4ed8}
  .sum-card.red{background:linear-gradient(135deg,#fff1f2,#ffe4e6);border-color:#fca5a5}
  .sum-card.red .s-num{color:#dc2626}
  .sum-card.orange{background:linear-gradient(135deg,#fff7ed,#fed7aa);border-color:#fdba74}
  .sum-card.orange .s-num{color:#c2410c}
  .sum-card.green{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-color:#86efac}
  .sum-card.green .s-num{color:#15803d}

  /* ===== TAB BAR ===== */
  .tab-bar{padding:0 28px 16px;display:flex;gap:10px}
  .tab-btn{border:2px solid #d1d5db;background:#fff;border-radius:22px;padding:8px 20px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;color:#374151;display:flex;align-items:center;gap:7px;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
  .tab-btn.active{background:#1e3a8a;color:#fff;border-color:#1e3a8a;box-shadow:0 3px 10px rgba(30,58,138,0.25)}
  .tab-btn:hover:not(.active){background:#f3f4f6;border-color:#9ca3af}

  /* ===== MAIN CONTENT ===== */
  .main-content{padding:0 28px 28px;display:grid;grid-template-columns:1fr 1fr;gap:18px}

  /* ===== SECTION CARD ===== */
  .sec-card{background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:22px 24px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
  .sec-card h3{font-size:15px;font-weight:900;color:#1e3a8a;margin-bottom:18px;display:flex;align-items:center;gap:8px;padding-bottom:10px;border-bottom:2px solid #e9edf5}
  .sec-card h3 .sec-icon{font-size:18px}

  /* ===== SEVERITY BARS ===== */
  .sev-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .sev-label{width:68px;font-size:14px;font-weight:900}
  .sev-bar-wrap{flex:1;background:#f1f5f9;border-radius:20px;height:26px;overflow:hidden}
  .sev-bar{height:100%;border-radius:20px;transition:width .6s ease;display:flex;align-items:center;padding-left:10px}
  .sev-val{width:36px;text-align:right;font-size:15px;font-weight:900}
  .sev-a .sev-label{color:#dc2626}
  .sev-a .sev-bar{background:linear-gradient(90deg,#ef4444,#dc2626)}
  .sev-a .sev-val{color:#dc2626}
  .sev-b .sev-label{color:#d97706}
  .sev-b .sev-bar{background:linear-gradient(90deg,#f59e0b,#d97706)}
  .sev-b .sev-val{color:#d97706}
  .sev-c .sev-label{color:#b45309}
  .sev-c .sev-bar{background:linear-gradient(90deg,#fbbf24,#f59e0b)}
  .sev-c .sev-val{color:#b45309}

  /* ===== TOP 5 BARS ===== */
  .top5-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .top5-name{width:170px;font-size:13px;font-weight:800;color:#1a1a2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .top5-bar-wrap{flex:1;background:#f1f5f9;border-radius:20px;height:22px;overflow:hidden}
  .top5-bar{height:100%;border-radius:20px;transition:width .6s ease}
  .top5-val{width:30px;text-align:right;font-size:14px;font-weight:900;color:#1a1a2e}

  /* ===== TABLE ===== */
  .table-section{grid-column:1/-1}
  .data-table{width:100%;border-collapse:collapse}
  .data-table th{background:#1e3a8a;color:#fff;font-weight:800;font-size:13px;padding:12px 16px;text-align:center;letter-spacing:.3px}
  .data-table th:first-child{text-align:left;border-radius:8px 0 0 0}
  .data-table th:last-child{border-radius:0 8px 0 0}
  .data-table td{padding:14px 16px;text-align:center;border-bottom:1px solid #e9edf5;vertical-align:middle}
  .data-table td:first-child{text-align:left}
  .data-table tr:nth-child(even) td{background:#f8fafc}
  .data-table tr:hover td{background:#eff6ff}
  .area-name{font-size:14px;font-weight:800;color:#1a1a2e}
  .area-pct{font-size:12px;color:#6b7280;margin-top:3px;font-weight:600}
  .num-blue{color:#1d4ed8;font-weight:900;font-size:16px}
  .num-green{color:#15803d;font-weight:900;font-size:16px}
  .num-red{color:#dc2626;font-weight:900;font-size:16px}
  .num-gray{color:#374151;font-weight:800;font-size:15px}
  .status-badge{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:800;white-space:nowrap}
  .status-wait{background:#fef3c7;color:#78350f;border:1.5px solid #fde68a}
  .status-done{background:#dcfce7;color:#14532d;border:1.5px solid #86efac}
  .status-inprog{background:#dbeafe;color:#1e3a8a;border:1.5px solid #93c5fd}

  /* ===== MODAL ===== */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;align-items:center;justify-content:center}
  .modal-overlay.active{display:flex}
  .modal-box{background:#fff;border-radius:16px;padding:30px;width:700px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,0.22)}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
  .modal-head h3{font-size:18px;font-weight:900;color:#1e3a8a}
  .modal-close{background:#dc2626;color:#fff;border:none;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;font-weight:700}
  .field{margin-bottom:10px}
  .field label{font-size:13px;font-weight:800;color:#1e3a5f;display:block;margin-bottom:4px}
  .field input,.field select{width:100%;border:1.5px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:14px;font-family:inherit;color:#1a1a2e}
  .field input:focus,.field select:focus{outline:2px solid #1e3a8a;border-color:#1e3a8a}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
  .save-btn{background:#1e3a8a;color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:15px;font-weight:800;cursor:pointer;width:100%;margin-top:12px;font-family:inherit}
  .add-btn{background:#eff6ff;border:2px dashed #2563eb;color:#1d4ed8;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;width:100%;margin-top:10px;font-family:inherit}
  .del-btn{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:6px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
  .area-edit-card{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:16px;margin-bottom:12px}
  .area-edit-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .area-edit-head span{font-size:14px;font-weight:800;color:#1e3a5f}
  .sec-sep{border-top:2px solid #e2e8f0;margin:20px 0 14px;font-size:14px;font-weight:800;color:#1e3a5f;padding-top:12px}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-icon">📊</div>
    <div class="topbar-title">
      <h2>ผลการดำเนินการกิจกรรม RSS (Risk Safety Suggestion)</h2>
      <p>ติดตามและอัปเดตสถานะความคืบหน้า</p>
    </div>
  </div>
  <div class="topbar-right">
    <div class="yr-badge" id="yr-badge">ปี 2026</div>
    <button class="refresh-btn" onclick="openModal()">✏ แก้ไขข้อมูล</button>
  </div>
</div>

<!-- SUMMARY CARDS -->
<div class="summary-row">
  <div class="sum-card blue">
    <div class="s-icon">📋</div>
    <div class="s-num" id="sum-total">0</div>
    <div class="s-label">RSS ทั้งหมด</div>
  </div>
  <div class="sum-card red">
    <div class="s-icon">🔴</div>
    <div class="s-num" id="sum-a">0</div>
    <div class="s-label">ระดับ A</div>
  </div>
  <div class="sum-card orange">
    <div class="s-icon">🔧</div>
    <div class="s-num" id="sum-inprog">0</div>
    <div class="s-label">กำลังดำเนินการ</div>
  </div>
  <div class="sum-card green">
    <div class="s-icon">✅</div>
    <div class="s-num" id="sum-done">0</div>
    <div class="s-label">แก้ไขแล้ว</div>
  </div>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn" id="tab-dept" onclick="switchTab('dept')">🏢 แยกตามแผนก</button>
  <button class="tab-btn active" id="tab-area" onclick="switchTab('area')">📍 แยกตามพื้นที่ 5ส.</button>
  <div style="flex:1"></div>
  <button class="tab-btn" style="background:#f0fdf4;border-color:#86efac;color:#15803d" onclick="openAreaModal()">✏ จัดการพื้นที่ 5ส.</button>
  <button class="tab-btn" style="background:#eff6ff;border-color:#93c5fd;color:#1e3a8a" onclick="openDeptModal()">✏ จัดการแผนก</button>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

  <!-- Severity Card -->
  <div class="sec-card">
    <h3><span class="sec-icon">🎯</span> ระดับความรุนแรง</h3>
    <div id="sev-bars"></div>
  </div>

  <!-- Top 5 Card -->
  <div class="sec-card">
    <h3><span class="sec-icon">📍</span> <span id="top5-title">Top 5 พื้นที่ 5ส.</span></h3>
    <div id="top5-bars"></div>
  </div>

  <!-- Table -->
  <div class="sec-card table-section">
    <h3><span class="sec-icon">📋</span> <span id="table-sec-title">ตารางติดตามตามพื้นที่ 5ส.</span></h3>
    <table class="data-table">
      <thead>
        <tr>
          <th id="table-th-name">พื้นที่ 5ส.</th>
          <th>RSS ทั้งหมด</th>
          <th style="color:#16a34a">แก้ไขแล้ว</th>
          <th style="color:#dc2626">คงเหลือ</th>
          <th>A</th>
          <th>B</th>
          <th>C</th>
          <th>สถานะ</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="modal-title">✏ แก้ไขข้อมูล</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const STORE = 'aam-rss-v3';

const DEFAULT = {
  year: 2026,
  depts: [
    {name:'Calotte 3', a:0, b:0, c:1, done:0},
    {name:'Calotte 4', a:2, b:0, c:0, done:0},
    {name:'Facility',  a:0, b:1, c:0, done:1},
    {name:'SL',        a:1, b:0, c:0, done:0},
    {name:'HR&GA',     a:0, b:0, c:1, done:0},
  ],
  areas: [
    {name:'Calotte 4',               a:2, b:0, c:0, done:0},
    {name:'Indoor (โรงอาหาร,ห้องน้ำ)', a:0, b:0, c:1, done:1},
    {name:'MN',                      a:1, b:0, c:0, done:0},
    {name:'Single',                  a:1, b:0, c:0, done:0},
  ]
};

let D = JSON.parse(JSON.stringify(DEFAULT));
try { const s=localStorage.getItem(STORE); if(s) D=JSON.parse(s); } catch{}

let activeTab = 'area';   // 'area' | 'dept'

const TOP5_COLORS = ['#10b981','#3b82f6','#8b5cf6','#f59e0b','#ef4444','#06b6d4','#ec4899','#84cc16'];

function total(a){ return a.a + a.b + a.c; }
function remaining(a){ return total(a) - a.done; }

function getList(){ return activeTab==='area' ? D.areas : D.depts; }

/* ─── RENDER ─── */
function render(){
  const list = getList();
  const totAll  = list.reduce((s,a)=>s+total(a),0);
  const totA    = list.reduce((s,a)=>s+a.a,0);
  const totDone = list.reduce((s,a)=>s+a.done,0);
  const inprog  = totAll - totDone;

  document.getElementById('sum-total').textContent  = totAll;
  document.getElementById('sum-a').textContent      = totA;
  document.getElementById('sum-inprog').textContent = inprog;
  document.getElementById('sum-done').textContent   = totDone;
  document.getElementById('yr-badge').textContent   = 'ปี '+D.year;

  // Severity bars
  const sevA = list.reduce((s,a)=>s+a.a,0);
  const sevB = list.reduce((s,a)=>s+a.b,0);
  const sevC = list.reduce((s,a)=>s+a.c,0);
  const sevMax = Math.max(sevA,sevB,sevC,1);
  document.getElementById('sev-bars').innerHTML = `
    <div class="sev-row sev-a">
      <div class="sev-label">ระดับ A</div>
      <div class="sev-bar-wrap"><div class="sev-bar" style="width:${sevA/sevMax*100}%"></div></div>
      <div class="sev-val">${sevA}</div>
    </div>
    <div class="sev-row sev-b">
      <div class="sev-label">ระดับ B</div>
      <div class="sev-bar-wrap"><div class="sev-bar" style="width:${sevB/sevMax*100}%"></div></div>
      <div class="sev-val">${sevB}</div>
    </div>
    <div class="sev-row sev-c">
      <div class="sev-label">ระดับ C</div>
      <div class="sev-bar-wrap"><div class="sev-bar" style="width:${sevC/sevMax*100}%"></div></div>
      <div class="sev-val">${sevC}</div>
    </div>
  `;

  // Top 5
  const label5 = activeTab==='area' ? 'พื้นที่ 5ส.' : 'แผนก';
  document.getElementById('top5-title').textContent = `Top 5 ${label5}`;
  const sorted = [...list].map(a=>({name:a.name,val:total(a)})).sort((x,y)=>y.val-x.val).slice(0,5);
  const top5Max = Math.max(...sorted.map(a=>a.val),1);
  document.getElementById('top5-bars').innerHTML = sorted.map((a,i)=>`
    <div class="top5-row">
      <div class="top5-name" title="${a.name}">${a.name}</div>
      <div class="top5-bar-wrap"><div class="top5-bar" style="width:${a.val/top5Max*100}%;background:${TOP5_COLORS[i%TOP5_COLORS.length]}"></div></div>
      <div class="top5-val">${a.val}</div>
    </div>
  `).join('') || '<div style="color:#9ca3af;font-size:13px;text-align:center;padding:20px">ไม่มีข้อมูล</div>';

  // Table header label
  const thLabel = activeTab==='area' ? 'พื้นที่ 5ส.' : 'แผนก';
  document.getElementById('table-th-name').textContent = thLabel;
  document.getElementById('table-sec-title').textContent = `📋 ตารางติดตามตาม${thLabel}`;

  // Table rows
  document.getElementById('table-body').innerHTML = list.map(a=>{
    const tot = total(a), rem = remaining(a);
    const pct = tot>0 ? Math.round(a.done/tot*100) : 0;
    let badge, status;
    if(pct===100){ badge='status-done'; status='✅ เสร็จสิ้น'; }
    else if(a.done>0){ badge='status-inprog'; status='🔧 กำลังดำเนินการ'; }
    else { badge='status-wait'; status='⏳ รอดำเนินการ'; }
    return `<tr>
      <td><div class="area-name">${a.name}</div><div class="area-pct">${pct}% แก้ไขแล้ว</div></td>
      <td><span class="num-blue">${tot}</span></td>
      <td><span class="num-green">${a.done}</span></td>
      <td><span class="num-red">${rem}</span></td>
      <td><span class="num-gray">${a.a}</span></td>
      <td><span class="num-gray">${a.b}</span></td>
      <td><span class="num-gray">${a.c}</span></td>
      <td><span class="status-badge ${badge}">${status}</span></td>
    </tr>`;
  }).join('') || `<tr><td colspan="8" style="text-align:center;color:#9ca3af;padding:24px;font-size:13px">ยังไม่มีข้อมูล — กด "แก้ไขข้อมูล" เพื่อเพิ่ม</td></tr>`;
}

/* ─── TABS ─── */
function switchTab(tab){
  activeTab = tab;
  document.getElementById('tab-dept').classList.toggle('active', tab==='dept');
  document.getElementById('tab-area').classList.toggle('active', tab==='area');
  render();
}

/* ─── MODAL HELPERS ─── */
function closeModal(){ document.getElementById('modal-edit').classList.remove('active'); }

function buildItemForm(list, type){
  // type = 'area' | 'dept'
  const label = type==='area' ? 'พื้นที่' : 'แผนก';
  return list.map((a,i)=>`
    <div style="background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:16px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-size:14px;font-weight:800;color:#1e3a8a">📍 ${label} ${i+1}</span>
        <button class="del-btn" onclick="delItem('${type}',${i})">🗑 ลบ</button>
      </div>
      <div class="field"><label>ชื่อ${label}</label>
        <input type="text" id="${type}-name-${i}" value="${a.name}" placeholder="ระบุชื่อ${label}">
      </div>
      <div class="grid4">
        <div class="field"><label>🔴 ระดับ A</label><input type="number" id="${type}-a-${i}" min="0" value="${a.a}"></div>
        <div class="field"><label>🟠 ระดับ B</label><input type="number" id="${type}-b-${i}" min="0" value="${a.b}"></div>
        <div class="field"><label>🟡 ระดับ C</label><input type="number" id="${type}-c-${i}" min="0" value="${a.c}"></div>
        <div class="field"><label>✅ แก้ไขแล้ว</label><input type="number" id="${type}-done-${i}" min="0" value="${a.done}"></div>
      </div>
    </div>
  `).join('');
}

function collectItems(type, n){
  return Array.from({length:n},(_,i)=>({
    name: document.getElementById(`${type}-name-${i}`)?.value.trim() || (type==='area'?'พื้นที่':'แผนก'),
    a:    +document.getElementById(`${type}-a-${i}`)?.value||0,
    b:    +document.getElementById(`${type}-b-${i}`)?.value||0,
    c:    +document.getElementById(`${type}-c-${i}`)?.value||0,
    done: +document.getElementById(`${type}-done-${i}`)?.value||0,
  }));
}

/* ─── OPEN MODALS ─── */
function openModal(){
  // Default: open whichever tab is active
  if(activeTab==='area') openAreaModal();
  else openDeptModal();
}

function openAreaModal(){
  document.getElementById('modal-title').textContent = '📍 จัดการพื้นที่ 5ส.';
  document.getElementById('modal-body').innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button class="tab-btn active" id="mb-area" onclick="switchModalTab('area')">📍 พื้นที่ 5ส.</button>
      <button class="tab-btn" id="mb-dept" onclick="switchModalTab('dept')">🏢 แผนก</button>
    </div>
    <div id="mb-content"></div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="add-btn" id="mb-add-btn" onclick="addItem()">+ เพิ่มพื้นที่</button>
    </div>
    <div style="margin-top:12px;padding-top:12px;border-top:2px solid #e2e8f0">
      <div class="field"><label>⚙ ปี</label><input type="number" id="cfg-year" value="${D.year}" style="width:120px"></div>
    </div>
    <button class="save-btn" onclick="saveAll()">💾 บันทึกข้อมูลทั้งหมด</button>
  `;
  renderModalContent('area');
  document.getElementById('modal-edit').classList.add('active');
}

function openDeptModal(){
  openAreaModal();
  setTimeout(()=>switchModalTab('dept'),50);
}

let modalTab = 'area';
function switchModalTab(tab){
  modalTab = tab;
  document.getElementById('mb-area').classList.toggle('active', tab==='area');
  document.getElementById('mb-dept').classList.toggle('active', tab==='dept');
  const label = tab==='area' ? 'พื้นที่' : 'แผนก';
  document.getElementById('mb-add-btn').textContent = `+ เพิ่ม${label}`;
  renderModalContent(tab);
}

function renderModalContent(tab){
  const list = tab==='area' ? D.areas : D.depts;
  document.getElementById('mb-content').innerHTML = buildItemForm(list, tab);
}

function addItem(){
  const label = modalTab==='area' ? 'พื้นที่ใหม่' : 'แผนกใหม่';
  // save current state first before adding
  syncCurrentModal();
  if(modalTab==='area') D.areas.push({name:label, a:0, b:0, c:0, done:0});
  else D.depts.push({name:label, a:0, b:0, c:0, done:0});
  renderModalContent(modalTab);
  // scroll to bottom
  setTimeout(()=>{ const mb=document.getElementById('mb-content'); mb.scrollIntoView({behavior:'smooth',block:'end'}); },100);
}

function delItem(type, i){
  syncCurrentModal();
  if(type==='area') D.areas.splice(i,1);
  else D.depts.splice(i,1);
  renderModalContent(type);
}

function syncCurrentModal(){
  // read current inputs and update D without closing
  const tab = modalTab;
  const list = tab==='area' ? D.areas : D.depts;
  const n = list.length;
  const updated = collectItems(tab, n);
  if(tab==='area') D.areas = updated;
  else D.depts = updated;
}

function saveAll(){
  syncCurrentModal();
  // also collect the other tab if it has inputs
  D.year = +document.getElementById('cfg-year')?.value || 2026;
  try{ localStorage.setItem(STORE,JSON.stringify(D)); }catch{}
  render();
  closeModal();
}

document.getElementById('modal-edit').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

// Wire up edit buttons in topbar (re-route to tab-aware opener)
document.querySelector('.refresh-btn').onclick = openAreaModal;

render();
</script>
</body>
</html>
